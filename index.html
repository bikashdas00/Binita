<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Love Anita❤️</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, #ff758c, #ff7eb3);
  overflow:hidden;
  text-align:center;
  color:white;
}

.container {
  position: relative;
  top: 30%;
}

h1 {
  font-size: 50px;
}

#typing {
  font-size: 22px;
  margin-top: 20px;
}

button {
  margin-top: 30px;
  padding: 15px 30px;
  border:none;
  border-radius: 25px;
  background:white;
  color:#ff4b5c;
  font-size:18px;
  cursor:pointer;
}

.heart {
  position: absolute;
  color: rgba(255,255,255,0.7);
  font-size: 20px;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh);}
  100% {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<div class="container">
  <h1>Hey My Love Anita❤️</h1>
  <div id="typing"></div>
  <button onclick="showLove()">Click for Surprise 🎁</button>
</div>

<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>

// Typing Effect
const text = "You are the most special person in my life 💖 I love you forever My love Anita...";
let i = 0;

function type() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 50);
  }
}
type();

// Button Surprise
function showLove() {
  alert("I LOVE YOU SO MUCH ANITA❤️");
}

// Floating Hearts
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random()*20 + 10) + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}, 300);

</script>

</body>
</html>
